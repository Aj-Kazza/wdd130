<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poll-Form</title>
    <link rel="stylesheet" href="styles/poll-form.css">
</head>

<body>
    <header>
        <h1>WDD 130 | HTML Form - User Poll</h1>
    </header>
    <main>

        <form action="submit">
            <fieldset>
                <legend>Contact Information</legend>
                <div class="form-item column2">
                    <label for="fullname">Full Name:</label>
                    <input type="text" id="fullname" name="fullname" required>
                </div>

                <div class="form-item column2">
                    <label for="email">Email: </label>
                    <input type="email" id="useremail" name="useremail" required>
                </div>

            </fieldset>

            <fieldset>
                <legend>Questions</legend>
                <div class="form-item column1">
                    <label for="favbrowser">What is your favourite
                        browser?</label>
                    <select name="favbrowser" id="favbrowser">
                        <option value="chrome">chrome</option>
                        <option value="safari">safari</option>
                        <option value="edge">edge</option>
                        <option value="brave">brave</option>
                        <option value="other">other</option>
                    </select>
                </div>

                <div class="form-item column1">
                    <label for="pet">Do you have a household pet?</label>
                    <input type="checkbox" name="pet" id="pet">
                </div>

                <div class="form-item cloumn1"><label for="feedback">List the places you have
                        lived</label>
                    <textarea name="feedback" id="feedback" rows="4"
                      placeholder="place 1, place 2, place 3"></textarea>
                </div>


            </fieldset>
            <button type="submit">Submit Poll</button>

        </form>


    </main>
    <footer>


    </footer>
</body>

</html>
