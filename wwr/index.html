<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home || Rapids White Water Rafting</title>
    <meta name="description"
      content="Home page for a White Water Rafting website project for WDD130">
    <meta name="author" content="Ari-John Katia">
    <link rel="stylesheet" href="styles/rafting.css">


</head>

<body>
    <header><img src="images/logo_bgremoved.png" alt="rafting logo of crossed oars" class="logo">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="hero">
            <img src="images/rafting_6.jpg" alt="hero image of people rafting">
            <h1>Rapids White Water Rafting</h1>
            <article class="call">
                <p>Come raft with us!</p>
                <a href="trips.html"><button>Join Now!</button></a>
            </article>
        </div>
        <section class="featured feature">
            <div>
                <figure><img src="images/rafting_4.jpg"
                      alt="image placeholder of river, let's pretend it exists at this moment, will change later">
                    <figcaption>Leisure Rafting</figcaption>
                </figure>
                <figure><img src="images/rafting_2.jpg"
                      alt="image placeholder of river, let's pretend it exists at this moment, will change later">
                    <figcaption>Speed Rafting</figcaption>
                </figure>
            </div>
        </section>
        <div class="signup">
            <img src="images/river_1.jpg" alt="">
            <div>
                <section>
                    <h2>Sign up to our newsletter</h2>
                    <p>Sign up to our newsletter to stay in touch with all the latest news and
                        happenings.</p>
                </section>
                <div>
                    <form action="submit">
                        <div class="form-item column2">
                            <label for="fullname">Name</label>
                            <input type="text" id="fullname" name="fullname"
                              placeholder="placeholder" required>
                        </div>

                        <div class="form-item column2">
                            <label for="useremail">Email</label>
                            <input type="email" id="useremail" name="useremail"
                              placeholder="placeholder" required>
                        </div>
                        <button type="submit">Sign up!</button>

                    </form>
                </div>
            </div>
        </div>
    </main>
    <footer>
        <p>&copy; 2026 &Star; Rapids White Water Rafting &Star; Ari-John Katia </p>
        <nav class="socialmedia">
            <a href="https://www.facebook.com/" target="_blank"><img src="images/facebook.png"
                  alt="facebook logo"></a>
            <a href="https://www.linkedin.com/" target="_blank"><img src="images/linkedin.png"
                  alt="linkedin logo"></a>
            <a href="https://www.instagram.com/" target="_blank"><img src="images/instagram.png"
                  alt="instagram logo"></a>
        </nav>
    </footer>
</body>

</html>
